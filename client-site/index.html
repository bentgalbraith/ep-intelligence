<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Progress Tracker</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="tracker-public">
        <h1 class="tracker-public-title">Client Progress Tracker</h1>
        <form class="tracker-public-form" id="login-form">
            <label class="field-label" for="f-firm">Firm</label>
            <input class="tracker-public-input" id="f-firm" type="text" placeholder="Firm code" autocomplete="off" required>
            <label class="field-label" for="f-id">Client ID</label>
            <input class="tracker-public-input" id="f-id" type="text" placeholder="Your Client ID" autocomplete="off" required>
            <label class="field-label" for="f-code">Access Code</label>
            <input class="tracker-public-input" id="f-code" type="password" placeholder="Your Access Code" autocomplete="off" required>
            <p class="tracker-public-error" id="error-msg"></p>
            <button type="submit" class="tracker-public-btn" id="btn-submit">View Progress</button>
        </form>
        <div class="tracker-public-result" id="result" style="display:none">
            <h2 class="tracker-public-name" id="client-name"></h2>
            <div class="tracker-public-steps" id="steps"></div>
            <button class="tracker-public-back" id="btn-back" type="button">Back</button>
        </div>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
