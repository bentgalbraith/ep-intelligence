<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EP Intelligence{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='EPILogo_Orange.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="mobile-banner" id="mobile-banner">
        <span>This site is designed for desktop. We recommend using a larger screen.</span>
        <button class="mobile-banner-close" id="mobile-banner-close" aria-label="Dismiss">&times;</button>
    </div>
    {% block background %}{% endblock %}
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script>
    (function(){
        var b=document.getElementById('mobile-banner'),x=document.getElementById('mobile-banner-close');
        if(b&&x){x.addEventListener('click',function(){b.style.display='none';});}
    })();
    </script>
</body>
</html>
