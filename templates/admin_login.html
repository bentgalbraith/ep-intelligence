{% extends "base.html" %}

{% block title %}Admin — EP Intelligence{% endblock %}
{% block body_class %}page-admin-login{% endblock %}

{% block body %}
<div class="admin-login-wrap">
    <div class="admin-login-card">
        <div class="admin-login-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
            </svg>
            <h1>Admin</h1>
        </div>
        <form method="POST" action="{{ url_for('admin_login') }}" class="admin-login-form">
            <input type="password" name="password" placeholder="Admin Password" autocomplete="off" autofocus required>
            <button type="submit" class="btn-pill btn-sm">Sign In</button>
            {% if error %}
            <p class="admin-login-error">{{ error }}</p>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
