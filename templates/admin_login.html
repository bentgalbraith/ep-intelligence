{% extends "base.html" %}

{% block title %}Admin — EP Intelligence{% endblock %}
{% block body_class %}page-admin-login{% endblock %}

{% block body %}
<div class="admin-login-wrap">
    <div class="admin-login-card">
        <h1 class="admin-login-header">Admin</h1>
        <form method="POST" action="{{ url_for('admin_login') }}" class="admin-login-form">
            <input type="password" name="password" placeholder="Password" autocomplete="off" autofocus required>
            <button type="submit" class="admin-login-btn">Sign in</button>
            {% if error %}
            <p class="admin-login-error">{{ error }}</p>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
