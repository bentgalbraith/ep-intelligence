<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estate Planning Intelligence</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(-45deg, #ea580c, #f97316, #c2410c, #fb923c, #d97706);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 800px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      display: inline-block;
      transition: transform 0.3s ease, text-shadow 0.3s ease;
      cursor: default;
    }

    h1:hover {
      transform: scale(1.05);
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: rgba(255, 255, 255, 0.85);
      margin-top: 1.5rem;
      font-weight: 400;
      line-height: 1.6;
      transition: transform 0.3s ease, text-shadow 0.3s ease;
      cursor: default;
    }

    p:hover {
      transform: scale(1.04);
      text-shadow: 0 3px 15px rgba(0, 0, 0, 0.25);
    }

    .btn-sign-in {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.75rem 2.8rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ea580c;
      text-decoration: none;
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.95);
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .btn-sign-in:hover {
      background: #ffffff;
      border-color: #ffffff;
      box-shadow: 0 6px 30px rgba(0, 0, 0, 0.2);
      transform: scale(1.06);
    }

    .btn-waitlist {
      display: inline-block;
      margin-top: 0.8rem;
      padding: 0.65rem 2.4rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 100px;
      background: transparent;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .btn-waitlist:hover {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.7);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      transform: scale(1.06);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      animation: float 7s ease-in-out infinite;
    }

    .orb-1 { width: 500px; height: 500px; background: #fff7ed; top: -200px; right: -150px; animation-delay: 0s; }
    .orb-2 { width: 450px; height: 450px; background: #fed7aa; bottom: -180px; left: -150px; animation-delay: -3.5s; }
    .orb-3 { width: 350px; height: 350px; background: #ffffff; top: 30%; left: 50%; animation-delay: -1.5s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.08); }
      66% { transform: translate(-30px, 25px) scale(0.92); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="container">
    <h1>Estate Planning Intelligence</h1>
    <p>Expanding the AI toolbox for estate planning firms.</p>
    <a href="{{ url_for('login') }}" class="btn-sign-in">Sign In</a>
    <a href="{{ url_for('waitlist') }}" class="btn-waitlist">Join Waitlist</a>
  </div>
</body>
</html>
