{% extends "tool_base.html" %}
{% set page_title = "Summarize Prospect EP Documents" %}

{% block form_panel %}
<form class="ep-form" id="sum-form">
    <label class="field-label">Upload Estate Planning PDFs</label>
    <div class="file-upload-group">
        <div class="file-drop-zone file-drop-zone--compact" id="drop-zone">
            <input type="file" id="pdf-input" accept=".pdf" multiple hidden>
            <svg class="drop-zone-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="m9 15 3-3 3 3"/>
            </svg>
            <span class="drop-zone-text">Drag & drop PDF(s) here, or click to browse</span>
        </div>
        <div class="file-list" id="file-list"></div>
    </div>

    <label class="field-label" for="notes">Additional Context</label>
    <textarea
        id="notes"
        name="notes"
        class="field-textarea field-textarea--short"
        placeholder="Anything important not mentioned in the document(s)..."
        rows="4"
    ></textarea>

    <button type="submit" class="btn-pill btn-generate" id="btn-summarize" disabled>
        <span class="btn-label">Summarize</span>
        <span class="spinner" hidden></span>
    </button>
</form>
{% endblock %}

{% block result_header %}
<div class="result-header" id="result-header" style="display:none">
    <button type="button" class="btn-download btn-download--primary" id="btn-docx">DOWNLOAD SUMMARY</button>
</div>
{% endblock %}

{% block tool_scripts %}
<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('pdf-input');
    const fileList = document.getElementById('file-list');
    const notes = document.getElementById('notes');
    const btnDocx = document.getElementById('btn-docx');

    let selectedFiles = [];
    let lastData = null;

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length) addFiles(fileInput.files);
        fileInput.value = '';
    });

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const pdfs = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf');
        if (pdfs.length) addFiles(pdfs);
    });

    function addFiles(files) {
        const newPdfs = [...files].filter(f => f.name.toLowerCase().endsWith('.pdf'));
        const existingNames = new Set(selectedFiles.map(f => f.name));
        for (const f of newPdfs) {
            if (!existingNames.has(f.name)) selectedFiles.push(f);
        }
        renderFileList();
    }

    function removeFile(idx) {
        selectedFiles.splice(idx, 1);
        renderFileList();
    }

    function renderFileList() {
        tool.btn.disabled = !selectedFiles.length;
        if (!selectedFiles.length) {
            fileList.innerHTML = '';
            return;
        }
        fileList.innerHTML = selectedFiles.map((f, i) =>
            `<div class="file-list-item">
                <span class="file-list-name">${escapeHtml(f.name)}</span>
                <button type="button" class="file-list-remove" data-idx="${i}" title="Remove">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
                    </svg>
                </button>
            </div>`
        ).join('');
    }

    fileList.addEventListener('click', (e) => {
        const btn = e.target.closest('.file-list-remove');
        if (btn) removeFile(parseInt(btn.dataset.idx));
    });

    const STATUS_URL_TEMPLATE = '{{ url_for("api_prospect_summarize_status", job_id="__JID__") }}';

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    async function pollJob(jobId) {
        const url = STATUS_URL_TEMPLATE.replace('__JID__', jobId);
        while (true) {
            await sleep(3000);
            const res = await fetchWithTimeout(url);
            const data = await res.json();
            if (data.status === 'processing') continue;
            if (data.status === 'error') throw new Error(data.error || 'Processing failed');
            return data;
        }
    }

    const tool = initToolForm({
        formId: 'sum-form',
        btnId: 'btn-summarize',
        async onSubmit({ setLoading, showResult, showError, btnLabel, hasRun }) {
            if (!selectedFiles.length) return;

            const state = setLoading(true);
            state.btnLabel.textContent = 'Summarizing...';
            document.getElementById('result-header').style.display = 'none';
            notes.disabled = true;
            lastData = null;

            try {
                const fd = new FormData();
                for (const f of selectedFiles) fd.append('pdfs', f);
                fd.append('notes', notes.value);

                const uploadRes = await fetchWithTimeout('{{ url_for("api_prospect_summarize") }}', {
                    method: 'POST',
                    body: fd,
                });

                const uploadData = await uploadRes.json();
                if (!uploadRes.ok) throw new Error(uploadData.error || 'Something went wrong');

                const result = await pollJob(uploadData.job_id);
                lastData = result.extraction;
                document.getElementById('result-header').style.display = 'flex';
                showResult(renderExtraction(lastData));
            } catch (err) {
                document.getElementById('result-header').style.display = 'none';
                lastData = null;
                showError(err.message);
            } finally {
                const s = setLoading(false);
                notes.disabled = false;
                tool.btn.disabled = !selectedFiles.length;
                s.btnLabel.textContent = hasRun() ? 'Re-Summarize' : 'Summarize';
            }
        }
    });

    function renderExtraction(data) {
        const sections = data.sections;
        const schemaSections = data.schema;
        let html = '';

        for (const schemaSec of schemaSections) {
            const secData = sections[schemaSec.id];
            const fieldData = secData ? secData.fields : null;
            const sectionHtml = renderFields(schemaSec.fields, fieldData, schemaSec.id);

            if (!sectionHtml) continue;

            html += `<details class="extract-section" open>
                <summary class="extract-section-header">${schemaSec.name}</summary>
                <div class="extract-section-body">${sectionHtml}</div>
            </details>`;
        }

        return html || '<p class="result-empty-text">No data could be extracted from these documents.</p>';
    }

    function renderFields(schemaFields, fieldData, sectionId) {
        let html = '';

        for (const sf of schemaFields) {
            const fd = fieldData ? fieldData[sf.id] : null;
            const hasValue = fd && fd.value != null;
            const displayValue = hasValue ? String(fd.value) : '';
            const dataKey = `${sectionId}__${sf.id}`;
            const fieldType = sf.type || 'text';
            const icons = renderFieldIcons(sf, fd, hasValue);

            let valueHtml;
            if (fieldType === 'choice') {
                valueHtml = renderChoiceField(sf, dataKey, displayValue, sf.options || []);
            } else {
                valueHtml = renderTextField(sf, dataKey, hasValue, displayValue);
            }

            html += `<div class="extract-field">
                <div class="extract-field-name">${sf.name} ${icons}</div>
                ${valueHtml}
            </div>`;
        }

        return html;
    }

    function renderFieldIcons(sf, fd, hasValue) {
        const quoteIcon = (hasValue && fd && fd.quote)
            ? `<span class="tip-icon" data-tip="${escapeAttrQuoted(fd.quote)}">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V21z"/>
                    <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3z"/>
                </svg>
            </span>`
            : '';
        const descIcon = `<span class="tip-icon" data-tip="${escapeAttr(sf.description)}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
            </svg>
        </span>`;
        return descIcon + quoteIcon;
    }

    function renderChoiceField(sf, dataKey, value, options) {
        let optionsHtml = '';
        for (const opt of options) {
            const checked = value === opt ? ' checked' : '';
            const id = `${dataKey}__${opt.replace(/\s+/g, '_')}`;
            optionsHtml += `<label class="radio-option" for="${escapeAttr(id)}">
                <input type="radio" id="${escapeAttr(id)}" name="${escapeAttr(dataKey)}" value="${escapeAttr(opt)}"${checked}>
                <span class="radio-label">${escapeHtml(opt)}</span>
            </label>`;
        }
        return `<div class="extract-field-options" data-key="${escapeAttr(dataKey)}" data-field-type="choice">${optionsHtml}</div>`;
    }

    function renderTextField(sf, dataKey, hasValue, displayValue) {
        const valueClass = hasValue ? 'extract-field-value' : 'extract-field-value extract-field-null';
        const placeholder = hasValue ? '' : 'NOT FOUND IN DOCUMENTS';
        return `<div class="${valueClass}" contenteditable="true" data-key="${escapeAttr(dataKey)}" data-field-type="text">${hasValue ? escapeHtml(displayValue) : placeholder}</div>`;
    }

    function escapeAttrQuoted(str) {
        return '&ldquo;' + escapeAttr(str) + '&rdquo;';
    }

    tool.resultContent.addEventListener('focusin', (e) => {
        if (e.target.classList.contains('extract-field-null')) {
            if (e.target.textContent === 'NOT FOUND IN DOCUMENTS') {
                e.target.textContent = '';
            }
            e.target.classList.remove('extract-field-null');
        }
    });

    tool.resultContent.addEventListener('focusout', (e) => {
        if (e.target.classList.contains('extract-field-value') && !e.target.textContent.trim()) {
            e.target.textContent = 'NOT FOUND IN DOCUMENTS';
            e.target.classList.add('extract-field-null');
        }
    });

    btnDocx.addEventListener('click', async () => {
        if (!lastData) return;
        btnDocx.disabled = true;
        try {
            const payload = {
                sections: collectCurrentValues(lastData),
                schema: lastData.schema,
                filenames: selectedFiles.map(f => f.name),
            };

            const res = await fetch('{{ url_for("api_prospect_summary_docx") }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
            });
            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error || 'Download failed');
            }
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `Prospect_EP_Summary_${exportTimestamp()}.docx`;
            a.click();
            URL.revokeObjectURL(a.href);
        } catch (err) {
            alert(err.message);
        } finally {
            btnDocx.disabled = false;
        }
    });

    function collectCurrentValues(data) {
        const sections = JSON.parse(JSON.stringify(data.sections));

        function setFieldValue(key, val) {
            const parts = key.split('__');
            const secId = parts[0];
            const fieldId = parts[1];
            if (sections[secId]) {
                if (!sections[secId].fields) sections[secId].fields = {};
                if (!sections[secId].fields[fieldId]) sections[secId].fields[fieldId] = {};
                sections[secId].fields[fieldId].value = val;
            }
        }

        tool.resultContent.querySelectorAll('[data-field-type="text"]').forEach(el => {
            let val = el.textContent.trim();
            if (val === 'NOT FOUND IN DOCUMENTS') val = null;
            setFieldValue(el.dataset.key, val);
        });

        tool.resultContent.querySelectorAll('[data-field-type="choice"]').forEach(el => {
            const checked = el.querySelector('input[type="radio"]:checked');
            setFieldValue(el.dataset.key, checked ? checked.value : null);
        });

        return sections;
    }

    const tip = document.createElement('div');
    tip.className = 'global-tooltip';
    document.body.appendChild(tip);
    let hideTimer = null;
    let activeIcon = null;

    document.addEventListener('mouseover', (e) => {
        const icon = e.target.closest('.tip-icon');
        if (!icon || !icon.dataset.tip) return;

        clearTimeout(hideTimer);
        activeIcon = icon;
        tip.innerHTML = icon.dataset.tip;
        tip.style.opacity = '1';

        const rect = icon.getBoundingClientRect();
        const tipWidth = tip.offsetWidth;
        const tipHeight = tip.offsetHeight;

        let left = rect.left + rect.width / 2 - tipWidth / 2;
        left = Math.max(8, Math.min(left, window.innerWidth - tipWidth - 8));

        let top = rect.top - tipHeight - 6;
        if (top < 8) top = rect.bottom + 6;

        tip.style.left = left + 'px';
        tip.style.top = top + 'px';
    });

    document.addEventListener('mouseout', (e) => {
        const icon = e.target.closest('.tip-icon');
        if (!icon || icon !== activeIcon) return;
        if (icon.contains(e.relatedTarget)) return;

        hideTimer = setTimeout(() => {
            tip.style.opacity = '0';
            activeIcon = null;
        }, 80);
    });
</script>
{% endblock %}
