<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>Sign In — EP Intelligence</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='EPILogo_Orange.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(-45deg, #ea580c, #f97316, #c2410c, #fb923c, #d97706);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 800px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1s ease forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .landing-logo {
      width: clamp(48px, 10vw, 72px);
      height: auto;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.1;
      cursor: default;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      width: 100%;
      max-width: 360px;
    }

    .login-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .login-row input {
      flex: 1;
      padding: 0.75rem 1.4rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: #1a1a1a;
      background: rgba(255, 255, 255, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.6);
      border-radius: 100px;
      outline: none;
      text-align: center;
      transition: all 0.3s ease;
    }

    .login-row input::placeholder {
      color: rgba(0, 0, 0, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.8rem;
    }

    .login-row input:focus {
      border-color: #ffffff;
      background: #ffffff;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
    }

    .btn-submit {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      color: #ffffff;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-submit:hover {
      background: rgba(255, 255, 255, 0.3);
      border-color: #ffffff;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
    }

    .btn-submit.is-loading svg { display: none; }
    .btn-submit.is-loading::after {
      content: '';
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-submit.is-loading { pointer-events: none; }

    .login-error {
      font-size: 0.85rem;
      font-weight: 500;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.2);
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.5; animation: float 7s ease-in-out infinite; }
    .orb-1 { width: 500px; height: 500px; background: #fff7ed; top: -200px; right: -150px; }
    .orb-2 { width: 450px; height: 450px; background: #fed7aa; bottom: -180px; left: -150px; animation-delay: -3.5s; }
    .orb-3 { width: 350px; height: 350px; background: #ffffff; top: 30%; left: 50%; animation-delay: -1.5s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -30px) scale(1.08); }
      66% { transform: translate(-30px, 25px) scale(0.92); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="container">
    <img src="{{ url_for('static', filename='EPILogo_White.png') }}" alt="EP Intelligence" class="landing-logo">
    <h1>Estate Planning Intelligence</h1>
    <form class="login-form" method="POST" action="{{ url_for('login') }}">
      <div class="login-row">
        <input
          type="password"
          name="access_code"
          placeholder="Access Code"
          autocomplete="off"
          autofocus
          required
        >
        <button type="submit" class="btn-submit" aria-label="Submit">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
          </svg>
        </button>
      </div>
      {% if error %}
      <p class="login-error">{{ error }}</p>
      {% endif %}
    </form>
  </div>
<script>
document.querySelector('.login-form').addEventListener('submit', function() {
    this.querySelector('.btn-submit').classList.add('is-loading');
});
</script>
</body>
</html>
